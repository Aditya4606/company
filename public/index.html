<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Machine Error Reporting & Maintenance Alert System — Report machine issues instantly via QR scan">
  <title>Machine Alert System</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
  <div class="container-narrow">
    <header class="page-header">
      <span class="icon">🏭</span>
      <h1>Machine Alert System</h1>
      <p>Report errors instantly. Resolve faster.</p>
    </header>

    <div class="role-grid">
      <a href="/report.html" class="glass-card role-card operator" id="role-operator">
        <span class="role-icon">📱</span>
        <span class="role-title">Operator</span>
        <span class="role-desc">Scan machine QR code to report an error</span>
      </a>

      <a href="/dashboard.html" class="glass-card role-card maintenance" id="role-maintenance">
        <span class="role-icon">🔧</span>
        <span class="role-title">Maintenance</span>
        <span class="role-desc">🔐 PIN required — View live alerts &amp; manage reports</span>
      </a>

      <a href="/qrcodes.html" class="glass-card role-card admin" id="role-admin">
        <span class="role-icon">🏷️</span>
        <span class="role-title">Admin</span>
        <span class="role-desc">🔐 PIN required — Generate &amp; print QR codes</span>
      </a>
    </div>
  </div>
</body>

</html>
